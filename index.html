<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mapa Contaminación Acústica - Línea 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha512-sA+z0pFgcoV0XxCkeEp3aIutEZnKnLMqkZEVf4asO7i13AvEC0VmHgGXY+4wxgAvtMyWwt4nD78wzLPy4IFVAA=="
    crossorigin=""
  />

  <!-- Tipografías -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Work+Sans:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Work Sans', sans-serif;
      background-color: #EEEEEE;
      color: #444;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 2.5em;
      text-align: center;
      margin-top: 1em;
    }

    .map-container {
      max-width: 1000px;
      margin: 2em auto;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 1em;
    }

    #map {
      height: 600px;
      width: 100%;
      border-radius: 8px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 1em;
      margin: 1em auto;
      font-size: 0.95em;
      flex-wrap: wrap;
      max-width: 800px;
    }

    .legend-item {
      display: flex;
      align-items: center;
    }

    .color-box {
      width: 20px;
      height: 20px;
      margin-right: 8px;
      border-radius: 4px;
    }

    .low { background-color: #aed9e0; }
    .medium { background-color: #f9c74f; }
    .high { background-color: #f94144; }
  </style>
</head>
<body>

  <h1>Contaminación Acústica en Línea 2</h1>

  <div class="map-container">
    <div id="map"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="color-box low"></div>Baja (&lt; 10%)</div>
    <div class="legend-item"><div class="color-box medium"></div>Media (10% - 39.9%)</div>
    <div class="legend-item"><div class="color-box high"></div>Alta (&ge; 40%)</div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha512-2fGqaNn8bXTRZq+vRAo9tHd7BQKeZ1+yM0c8bK3+vBvEVxEzUqIoOKTNgOg77Zl78j0DF+4XCBcfWH8p4G1g8g=="
    crossorigin=""
  ></script>

  <script>
    const map = L.map('map').setView([-33.49, -70.655], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const estaciones = [
      { nombre: "Hospital del Pino", lat: -33.54390, lon: -70.66422, porcentaje: 4.3 },
      { nombre: "Copa Lo Martínez", lat: -33.53892, lon: -70.66255, porcentaje: 2.2 },
      { nombre: "Observatorio", lat: -33.53385, lon: -70.66094, porcentaje: 2.2 },
      { nombre: "El Bosque", lat: -33.52872, lon: -70.65933, porcentaje: 4.3 },
      { nombre: "La Cisterna", lat: -33.52360, lon: -70.65782, porcentaje: 46.2 },
      { nombre: "El Parrón", lat: -33.51810, lon: -70.65600, porcentaje: 1.1 },
      { nombre: "Lo Ovalle", lat: -33.51300, lon: -70.65630, porcentaje: 15.1 },
      { nombre: "Ciudad del Niño", lat: -33.50954, lon: -70.65665, porcentaje: 2.2 },
      { nombre: "Departamental", lat: -33.50244, lon: -70.65463, porcentaje: 5.4 },
      { nombre: "Lo Vial", lat: -33.49683, lon: -70.65302, porcentaje: 2.2 },
      { nombre: "Franklin", lat: -33.49183, lon: -70.65178, porcentaje: 8.6 },
      { nombre: "Parque O'Higgins", lat: -33.47558, lon: -70.64832, porcentaje: 6.5 },
      { nombre: "Toesca", lat: -33.46470, lon: -70.64702, porcentaje: 4.3 },
      { nombre: "Los Héroes", lat: -33.45789, lon: -70.64621, porcentaje: 23.7 },
      { nombre: "Santa Ana", lat: -33.44889, lon: -70.64500, porcentaje: 13.0 },
      { nombre: "Puente Cal y Canto", lat: -33.44004, lon: -70.64408, porcentaje: 8.6 },
      { nombre: "Patronato", lat: -33.43265, lon: -70.64385, porcentaje: 5.4 },
      { nombre: "Cementerios", lat: -33.42610, lon: -70.64359, porcentaje: 2.2 },
      { nombre: "Cerro Blanco", lat: -33.41955, lon: -70.64339, porcentaje: 1.1 },
      { nombre: "Einstein", lat: -33.40595, lon: -70.64317, porcentaje: 1.1 },
      { nombre: "Dorsal", lat: -33.39696, lon: -70.64274, porcentaje: 1.1 },
      { nombre: "Zapadores", lat: -33.39094, lon: -70.64244, porcentaje: 4.3 },
      { nombre: "Vespucio Norte", lat: -33.38075, lon: -70.64634, porcentaje: 8.6 }
    ];

    estaciones.forEach(estacion => {
      let color;
      if (estacion.porcentaje >= 40) {
        color = "#f94144";
      } else if (estacion.porcentaje >= 10) {
        color = "#f9c74f";
      } else {
        color = "#aed9e0";
      }

      const circle = L.circleMarker([estacion.lat, estacion.lon], {
        radius: 8,
        fillColor: color,
        color: "#555",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.9
      }).addTo(map);

      circle.bindPopup(`<strong>${estacion.nombre}</strong><br>Nivel de ruido: ${estacion.porcentaje}%`);
    });
  </script>
</body>
</html>
